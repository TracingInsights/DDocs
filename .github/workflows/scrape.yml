name: FIA F1 Documents - Scrape and Release

on:
  schedule:
    # Run every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  scrape:
    # Only run on schedule or manual trigger, not on push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            scraper.py
            transcript_scraper.py
            config.py
            shared_utils.py
            pyproject.toml
            uv.lock
            documents/manifest.json
            documents/discovery_cache.json
            documents/transcript_discovery_cache.json
          sparse-checkout-cone-mode: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run scraper
        id: scrape
        env:
          # Cache TTL can be configured via environment variable
          # Default is 2.5 hours (slightly under the 3-hour cron interval)
          DISCOVERY_CACHE_TTL_HOURS: "2.5"
        run: uv run python scraper.py --output-dir documents
      - name: Run transcript scraper
        id: scrape_transcripts
        # Run transcript scraper after main scraper completes (sequential execution)
        if: always()
        env:
          # Cache TTL can be configured via environment variable
          DISCOVERY_CACHE_TTL_HOURS: "2.5"
        run: uv run python transcript_scraper.py --year $(date +%Y) --super-aggressive
      - name: Check if any scraper succeeded
        run: |
          if [[ "${{ steps.scrape.outcome }}" == "failure" ]] && [[ "${{ steps.scrape_transcripts.outcome }}" == "failure" ]]; then
            echo "Both scrapers failed"
            exit 1
          fi
          echo "At least one scraper succeeded"
      - name: Commit and push new documents
        id: commit_changes
        run: |
          git sparse-checkout disable
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documents/ classification/
          if git diff --cached --quiet; then
            echo "No new documents to commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            
            # Safely extract numeric values with defaults
            NEW_DOCS=$(echo "${{ steps.scrape.outputs.new_documents }}" | grep -E '^[0-9]+$' || echo "0")
            NEW_TRANSCRIPTS=$(echo "${{ steps.scrape_transcripts.outputs.new_transcripts }}" | grep -E '^[0-9]+$' || echo "0")
            TOTAL=$((NEW_DOCS + NEW_TRANSCRIPTS))
            
            git commit -m "docs: add ${TOTAL} FIA F1 documents (${NEW_DOCS} decisions, ${NEW_TRANSCRIPTS} transcripts) [${TIMESTAMP}]"
            
            # Push and verify success
            if git push; then
              # Verify the push actually succeeded by checking remote
              sleep 2
              git fetch origin main
              LOCAL_COMMIT=$(git rev-parse HEAD)
              REMOTE_COMMIT=$(git rev-parse origin/main)
              if [ "$LOCAL_COMMIT" = "$REMOTE_COMMIT" ]; then
                echo "Git push verified successfully"
                echo "has_changes=true" >> $GITHUB_OUTPUT
                echo "new_docs=$NEW_DOCS" >> $GITHUB_OUTPUT
                echo "new_transcripts=$NEW_TRANSCRIPTS" >> $GITHUB_OUTPUT
                echo "total=$TOTAL" >> $GITHUB_OUTPUT
              else
                echo "Git push verification failed - commits don't match"
                exit 1
              fi
            else
              echo "Git push failed"
              exit 1
            fi
          fi
      
      - name: Generate release notes
        if: steps.commit_changes.outputs.has_changes == 'true'
        id: release_notes
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          CURRENT_YEAR=$(date +%Y)
          NEW_DOCS="${{ steps.commit_changes.outputs.new_docs }}"
          NEW_TRANSCRIPTS="${{ steps.commit_changes.outputs.new_transcripts }}"
          
          # Get list of years with updates from git diff, handle case where HEAD~1 might not exist
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            UPDATED_YEARS=$(git diff --name-only HEAD~1 HEAD | grep -oE '(documents|classification)/[0-9]{4}/' | grep -oE '[0-9]{4}' | sort -u | tr '\n' ', ' | sed 's/,$//')
          else
            # First commit case - get years from all added files
            UPDATED_YEARS=$(git diff --name-only --cached | grep -oE '(documents|classification)/[0-9]{4}/' | grep -oE '[0-9]{4}' | sort -u | tr '\n' ', ' | sed 's/,$//')
          fi
          
          # Create release notes
          cat > release_notes.md << EOF
          ## FIA F1 Documents Update - ${TIMESTAMP}
          
          ### Summary
          - 📄 New documents: ${NEW_DOCS}
          - 📊 New transcripts: ${NEW_TRANSCRIPTS}
          - 📅 Years updated: ${UPDATED_YEARS:-$CURRENT_YEAR}
          
          ### Access via jsDelivr
          
          You can access the latest data using jsDelivr CDN:
          
          \`\`\`bash
          # Latest manifest
          https://cdn.jsdelivr.net/gh/${{ github.repository }}@latest/documents/manifest.json
          
          # Latest classifications (current year)
          https://cdn.jsdelivr.net/gh/${{ github.repository }}@latest/classification/${CURRENT_YEAR}/classifications.json
          
          # Specific document (example)
          https://cdn.jsdelivr.net/gh/${{ github.repository }}@latest/documents/${CURRENT_YEAR}/[event-name]/[document-name].pdf
          \`\`\`
          
          ### Recent Changes
          
          \`\`\`
          $(git log -1 --pretty=format:"%s%n%n%b")
          \`\`\`
          EOF
          
          echo "Release notes generated"
      
      - name: Create Release
        if: steps.commit_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: release-${{ github.run_number }}
          name: Documents Update - ${{ github.run_number }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
